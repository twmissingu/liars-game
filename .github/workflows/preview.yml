name: Preview - Deploy PR

on:
  pull_request:
    branches: [ main, master, develop ]
    types: [opened, synchronize]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  # 构建并部署预览
  deploy-preview:
    runs-on: ubuntu-latest
    name: 🚀 部署预览环境
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 🧪 运行测试
        run: npm run test:ci
        timeout-minutes: 10
        continue-on-error: true

      - name: 🔨 构建预览版本
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_URL: /liars-game/preview/pr-${{ github.event.pull_request.number }}/
          VITE_PREVIEW_MODE: 'true'
          VITE_PR_NUMBER: ${{ github.event.pull_request.number }}
          VITE_BUILD_TIME: ${{ github.event.repository.updated_at }}

      - name: ✅ 验证构建输出
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ 构建输出目录 'dist' 不存在"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ dist/index.html 不存在"
            exit 1
          fi
          echo "✅ 构建验证通过"

      - name: 🚀 部署到 GitHub Pages (预览)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: 💬 评论 PR (部署成功)
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/preview/pr-${prNumber}/`;
            const commitSha = context.sha.substring(0, 7);
            
            const body = `🚀 **预览部署成功!**
            
            | 项目 | 信息 |
            |------|------|
            | 🔗 预览地址 | [${previewUrl}](${previewUrl}) |
            | 🔨 提交 | \`${commitSha}\` |
            | ⏰ 部署时间 | ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })} |
            
            > 💡 此预览将在推送新提交时自动更新。`;
            
            // 查找是否已有预览评论
            const comments = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const previewComment = comments.data.find(comment => 
              comment.body.includes('🚀 **预览部署成功!**')
            );
            
            if (previewComment) {
              // 更新已有评论
              await github.rest.issues.updateComment({
                comment_id: previewComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              // 创建新评论
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # 清理预览
  cleanup-preview:
    runs-on: ubuntu-latest
    name: 🧹 清理预览环境
    if: github.event.action == 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: 🗑️ 删除预览文件
        run: |
          if [ -d "preview/pr-${{ github.event.pull_request.number }}" ]; then
            rm -rf "preview/pr-${{ github.event.pull_request.number }}"
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add .
            git commit -m "🧹 清理 PR #${{ github.event.pull_request.number }} 的预览"
            git push
            echo "✅ 预览已清理"
          else
            echo "ℹ️ 预览目录不存在，无需清理"
          fi

  # 部署失败通知
  notify-failure:
    runs-on: ubuntu-latest
    name: 🚨 失败通知
    needs: deploy-preview
    if: failure()
    steps:
      - name: 💬 评论 PR (部署失败)
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            const body = `❌ **预览部署失败!**
            
            请检查工作流日志以获取详细信息：
            🔍 [查看日志](${runUrl})
            
            常见原因：
            - 构建错误（TypeScript/语法错误）
            - 测试失败
            - 依赖安装问题`;
            
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
