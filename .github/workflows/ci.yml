name: CI - Build and Test

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 代码质量检查 - 并行执行
  lint:
    runs-on: ubuntu-latest
    name: 🔍 ESLint 检查
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 🔍 Run ESLint
        run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    name: 📐 TypeScript 类型检查
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 📐 Run TypeScript check
        run: npm run type-check

  format-check:
    runs-on: ubuntu-latest
    name: 💅 Prettier 格式检查
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 💅 Check Prettier formatting
        run: npm run format:check

  # 测试 - 并行执行
  test-unit:
    runs-on: ubuntu-latest
    name: 🧪 单元测试
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 🧪 Run unit tests
        run: npm run test:unit
        timeout-minutes: 10

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-${{ github.run_id }}
          path: coverage/
          retention-days: 7

  test-integration:
    runs-on: ubuntu-latest
    name: 🔗 集成测试
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 🔗 Run integration tests
        run: npm run test:integration
        timeout-minutes: 10

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration-${{ github.run_id }}
          path: coverage/
          retention-days: 7

  # 构建
  build:
    runs-on: ubuntu-latest
    name: 🔨 构建项目
    needs: [lint, type-check, test-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: 🔨 Build project
        run: npm run build

      - name: ✅ Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build output directory 'dist' not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ index.html not found in dist"
            exit 1
          fi
          echo "✅ Build output verified"
          ls -la dist/

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_id }}
          path: dist/
          retention-days: 1

  # 安全扫描
  security:
    runs-on: ubuntu-latest
    name: 🔒 安全扫描
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: 📦 Check for outdated dependencies
        run: npm outdated
        continue-on-error: true

  # 汇总报告
  summary:
    runs-on: ubuntu-latest
    name: 📋 CI 汇总报告
    needs: [lint, type-check, format-check, test-unit, test-integration, build, security]
    if: always()
    steps:
      - name: 生成汇总报告
        run: |
          echo "# CI 执行结果汇总 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 ESLint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📐 TypeScript | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💅 Prettier | ${{ needs.format-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 单元测试 | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 集成测试 | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 构建 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 安全扫描 | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
