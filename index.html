<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/geass-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Geass: Liar's Game</title>
    <meta name="description" content="Code Geass: Liar's Game - 布里塔尼亚的谎言对决" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      /* 加载动画 */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #0a0a0f 0%, #1a1a24 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-geass {
        width: 100px;
        height: 100px;
        animation: rotateGeass 2s linear infinite;
      }
      
      @keyframes rotateGeass {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 1rem;
        font-family: 'Cinzel', serif;
        font-size: 1rem;
        color: #d4af37;
        letter-spacing: 0.3em;
      }
    </style>
    <script type="module" crossorigin src="/liars-game/assets/index-CU251kgZ.js"></script>
    <link rel="stylesheet" crossorigin href="/liars-game/assets/index-CIarEH_O.css">
  </head>
  <body>
    <div id="root"></div>
    <div class="loading-screen" id="loading">
      <svg class="loading-geass" viewBox="0 0 100 100">
        <path
          d="M50 10 L57 40 L90 50 L57 60 L50 90 L43 60 L10 50 L43 40 Z"
          fill="none"
          stroke="#dc2626"
          stroke-width="2"
        />
        <circle cx="50" cy="50" r="5" fill="#dc2626" />
      </svg>
      <div class="loading-text">LOADING...</div>
    </div>
    <script>
      // 隐藏加载动画
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading').classList.add('hidden');
        }, 1000);
      });
    </script>
  </body>
</html>
